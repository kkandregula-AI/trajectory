  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg:#0a0c10; --bg2:#0f1218; --bg3:#161b24; --bg4:#1c2230;
      --border:rgba(255,255,255,0.07); --border2:rgba(255,255,255,0.12);
      --gold:#f0c040; --text:#e8ecf4; --text2:#8b96aa; --text3:#5a6270;
      --radius:12px; --radius2:8px;
    }
    html,body{height:100%;background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;}
    #root{height:100%;}
    ::-webkit-scrollbar{width:4px;height:4px;}
    ::-webkit-scrollbar-track{background:transparent;}
    ::-webkit-scrollbar-thumb{background:var(--bg4);border-radius:2px;}

    /* INSTALL BANNER */
    .install-banner{
      position:fixed;bottom:0;left:0;right:0;z-index:200;
      background:linear-gradient(90deg,#0f1218,#1c2230);
      border-top:1px solid rgba(240,192,64,0.25);
      padding:14px 24px;display:flex;align-items:center;gap:16px;
      box-shadow:0 -8px 32px rgba(0,0,0,0.5);
    }
    .install-banner-icon{width:40px;height:40px;border-radius:10px;flex-shrink:0;}
    .install-banner-text{flex:1;}
    .install-banner-title{font-family:'Syne',sans-serif;font-weight:700;font-size:14px;color:#e8ecf4;}
    .install-banner-sub{font-size:12px;color:#8b96aa;margin-top:2px;}
    .install-banner-btn{
      background:linear-gradient(135deg,#f0c040,#fb923c);border:none;border-radius:8px;
      color:#0a0c10;font-family:'Syne',sans-serif;font-weight:700;font-size:13px;
      padding:9px 20px;cursor:pointer;white-space:nowrap;transition:opacity 0.15s;
    }
    .install-banner-btn:hover{opacity:0.88;}
    .install-banner-close{
      background:none;border:none;color:#5a6270;font-size:18px;cursor:pointer;
      padding:4px 6px;line-height:1;
    }
    .install-banner-close:hover{color:#8b96aa;}

    /* API KEY MODAL */
    .api-modal-overlay{
      position:fixed;inset:0;background:rgba(0,0,0,0.88);
      display:flex;align-items:center;justify-content:center;z-index:9999;
      backdrop-filter:blur(8px);
    }
    .api-modal{
      background:var(--bg3);border:1px solid rgba(240,192,64,0.3);
      border-radius:16px;padding:32px;width:440px;max-width:92vw;
      box-shadow:0 24px 64px rgba(0,0,0,0.6);
    }
    .api-modal-logo{display:flex;align-items:center;gap:12px;margin-bottom:22px;}
    .api-modal-icon{width:44px;height:44px;border-radius:10px;overflow:hidden;flex-shrink:0;}
    .api-modal-title{font-family:'Syne',sans-serif;font-size:22px;font-weight:800;}
    .api-modal-title span{color:#f0c040;}
    .api-modal-title small{display:block;font-size:12px;color:#5a6270;font-weight:400;letter-spacing:1px;text-transform:uppercase;margin-top:2px;}
    .api-modal p{color:#8b96aa;font-size:13px;line-height:1.65;margin-bottom:20px;}
    .api-modal label{display:block;font-size:11px;font-weight:600;letter-spacing:1px;text-transform:uppercase;color:#5a6270;margin-bottom:7px;}
    .api-modal input{
      width:100%;background:var(--bg4);border:1px solid var(--border2);

    stakeholders:["marketing","pm","investor","cs"],
    deliverables:["GTM Strategy","Pricing Model","Launch Plan","Sales Playbook","Marketing Assets"],
    tasks:[
      {id:"g1",title:"Finalise pricing & packaging model",owner:"investor",priority:"high",done:false},
      {id:"g2",title:"Define GTM strategy & launch channels",owner:"marketing",priority:"high",done:false},
      {id:"g3",title:"Create launch messaging & positioning",owner:"marketing",priority:"high",done:false},
      {id:"g4",title:"Build website landing page & SEO",owner:"marketing",priority:"high",done:false},
      {id:"g5",title:"Develop sales enablement materials",owner:"marketing",priority:"medium",done:false},
      {id:"g6",title:"Set up customer onboarding flows",owner:"cs",priority:"high",done:false},
      {id:"g7",title:"Train support & success teams",owner:"cs",priority:"medium",done:false},
      {id:"g8",title:"Define launch KPIs & success metrics",owner:"pm",priority:"high",done:false},
      {id:"g9",title:"Investor & press briefing preparation",owner:"investor",priority:"medium",done:false},
    ],
    metrics:["Channels activated","Marketing assets ready","Pipeline generated"],
    aiPrompt:"You are a Go-to-Market Strategist. Help the user craft compelling GTM strategies, sharpen positioning, define pricing, and plan a high-impact product launch. Be strategic and bold.",
  },
  {
    id:"launch",label:"Launch",sub:"Release Day",icon:"🚀",color:"#f0c040",
    stakeholders:["pm","rnd","marketing","investor","cs"],
    deliverables:["Product Live","Press Release","Announcement Campaign","Launch Dashboard","Incident Response Plan"],
    tasks:[
      {id:"l1",title:"Final production deployment & smoke test",owner:"rnd",priority:"high",done:false},
      {id:"l2",title:"Activate marketing campaigns across channels",owner:"marketing",priority:"high",done:false},
      {id:"l3",title:"Publish press release & announcements",owner:"marketing",priority:"high",done:false},
      {id:"l4",title:"Monitor real-time metrics & alerts",owner:"pm",priority:"high",done:false},
      {id:"l5",title:"Activate customer support & success teams",owner:"cs",priority:"high",done:false},
      {id:"l6",title:"Executive & investor communications",owner:"investor",priority:"medium",done:false},
      {id:"l7",title:"Launch retrospective (immediate 24h)",owner:"pm",priority:"medium",done:false},
    ],
    metrics:["Uptime %","Sign-ups Day 1","Revenue Day 1"],
    aiPrompt:"You are a Launch Director. Help coordinate all launch activities, create compelling announcements, and ensure a smooth, high-energy product launch. Be action-oriented and inspiring.",
  },
  {
    id:"postrelease",label:"Post-Release",sub:"Growth & Iteration",icon:"📈",color:"#2dd4bf",
    stakeholders:["pm","rnd","marketing","investor","cs"],
    deliverables:["Analytics Report","Feedback Synthesis","Roadmap v2","Retention Strategy","Investor Update"],
    tasks:[
      {id:"p1",title:"Analyse launch metrics vs KPIs",owner:"pm",priority:"high",done:false},
      {id:"p2",title:"Collect & synthesise user feedback",owner:"cs",priority:"high",done:false},
      {id:"p3",title:"Prioritise & plan v2 feature roadmap",owner:"pm",priority:"high",done:false},
      {id:"p4",title:"Optimise onboarding & activation funnel",owner:"cs",priority:"high",done:false},
      {id:"p5",title:"Run growth experiments & A/B tests",owner:"marketing",priority:"medium",done:false},
      {id:"p6",title:"Patch & resolve post-launch issues",owner:"rnd",priority:"high",done:false},
      {id:"p7",title:"Prepare investor & board update",owner:"investor",priority:"medium",done:false},
      {id:"p8",title:"Conduct 30/60/90-day review",owner:"pm",priority:"high",done:false},
    ],
    metrics:["DAU/MAU","Churn rate","NPS score"],
    aiPrompt:"You are a Product Growth expert. Help the user interpret post-launch data, synthesise user feedback, plan iterative improvements, and build toward sustainable growth. Be insight-driven.",
  },
];

const OWNER_MAP = {
  pm:        {label:"Product",       color:"#60a5fa"},
  rnd:       {label:"R&D",           color:"#a78bfa"},
  design:    {label:"Design",        color:"#f472b6"},
  marketing: {label:"Marketing",     color:"#fb923c"},
  investor:  {label:"Investors",     color:"#34d399"},
  cs:        {label:"Cust. Success", color:"#2dd4bf"},
};

function ProgressRing({ pct, color, size=64 }) {
  const r = (size - 10) / 2;
  const circ = 2 * Math.PI * r;
  const offset = circ - (pct / 100) * circ;
  return (
    <svg width={size} height={size}>
      <circle cx={size/2} cy={size/2} r={r} fill="none" stroke="rgba(255,255,255,0.07)" strokeWidth="5"/>
      <circle cx={size/2} cy={size/2} r={r} fill="none" stroke={color} strokeWidth="5"
        strokeDasharray={circ} strokeDashoffset={offset} strokeLinecap="round"
        style={{transform:"rotate(-90deg)",transformOrigin:"center",transition:"stroke-dashoffset 0.5s"}}/>
      <text x={size/2} y={size/2-3} textAnchor="middle" dominantBaseline="middle"
        fontSize="13" fontFamily="Syne,sans-serif" fontWeight="800" fill="#e8ecf4">{pct}%</text>
      <text x={size/2} y={size/2+11} textAnchor="middle" dominantBaseline="middle"
        fontSize="8" fontFamily="DM Sans,sans-serif" fill="#5a6270">done</text>
    </svg>
  );
}

function ApiKeyModal({ onSave }) {
  const [val, setVal] = useState("");
  return (
    <div className="api-modal-overlay">
      <div className="api-modal">
        <div className="api-modal-logo">
          <img src={SVG_ICON} className="api-modal-icon" alt="Trajectory icon"/>
          <div>
            <div className="api-modal-title">Trajectory<span>.</span>
              <small>AI Product Lifecycle</small>
            </div>
          </div>
        </div>
        <p>
          This app uses the <strong style={{color:"#e8ecf4"}}>Anthropic Claude API</strong> to power
          phase-specific AI assistants across all 8 product lifecycle stages.
          Your key is stored only in <strong style={{color:"#e8ecf4"}}>your browser</strong> and sent
          exclusively to Anthropic's servers.
        </p>
        <label>Anthropic API Key</label>
        <input
          type="password"
          placeholder="sk-ant-api03-…"
          value={val}
          onChange={e => setVal(e.target.value)}
          onKeyDown={e => e.key==="Enter" && val.startsWith("sk-") && onSave(val)}
          autoFocus
        />
        <button className="api-modal-btn" disabled={!val.startsWith("sk-")} onClick={() => onSave(val)}>
          Launch Trajectory →
        </button>
        <p className="api-modal-note">
          Get your key at <a href="https://console.anthropic.com" target="_blank" rel="noreferrer">console.anthropic.com</a>
          &nbsp;·&nbsp;
          <span style={{cursor:"pointer",textDecoration:"underline",color:"#5a6270"}} onClick={() => onSave("SKIP")}>
            Skip — use without AI
          </span>
        </p>
      </div>
    </div>
  );
}

function InstallBanner({ onInstall, onDismiss }) {
  return (
    <div className="install-banner">
      <img src={SVG_ICON} className="install-banner-icon" alt="Trajectory"/>
      <div className="install-banner-text">
        <div className="install-banner-title">Install Trajectory</div>
        <div className="install-banner-sub">Add to home screen for offline access & app experience</div>
      </div>
      <button className="install-banner-btn" onClick={onInstall}>Install App</button>
      <button className="install-banner-close" onClick={onDismiss}>✕</button>
    </div>
  );
}

function App() {
  const [apiKey, setApiKey]           = useState(() => localStorage.getItem("trajectory_apikey") || null);
  const [activePhase, setActivePhase] = useState(0);
  const [activeSH, setActiveSH]       = useState("all");
  const [phases, setPhases]           = useState(PHASES_DATA.map(p => ({...p, tasks:p.tasks.map(t=>({...t}))})));
  const [productName, setProductName] = useState("My Product");
  const [notes, setNotes]             = useState({});
  const [aiChats, setAiChats]         = useState({});
  const [aiInput, setAiInput]         = useState("");
  const [aiLoading, setAiLoading]     = useState(false);
  const [deferredPrompt, setDeferredPrompt] = useState(null);
  const [showInstall, setShowInstall]       = useState(false);
  const aiRef = useRef(null);

  useEffect(() => {
    const handler = e => { e.preventDefault(); setDeferredPrompt(e); setShowInstall(true); };
    window.addEventListener("beforeinstallprompt", handler);
    return () => window.removeEventListener("beforeinstallprompt", handler);
  }, []);

  function saveApiKey(key) {
    if (key !== "SKIP") localStorage.setItem("trajectory_apikey", key);
    setApiKey(key);
  }

  async function handleInstall() {
    if (!deferredPrompt) return;
    deferredPrompt.prompt();
    const { outcome } = await deferredPrompt.userChoice;
    setDeferredPrompt(null);
    setShowInstall(false);
  }

  const phase = phases[activePhase];
  const phaseColor = phase.color;
  const visibleTasks = activeSH === "all" ? phase.tasks : phase.tasks.filter(t => t.owner === activeSH);
  const phasePct = phase.tasks.length ? Math.round(phase.tasks.filter(t=>t.done).length / phase.tasks.length * 100) : 0;
  const allTasks = phases.flatMap(p => p.tasks);
  const totalPct = allTasks.length ? Math.round(allTasks.filter(t=>t.done).length / allTasks.length * 100) : 0;
  const currentChat = aiChats[phase.id] || [];

  function toggleTask(id) {
    setPhases(prev => prev.map((p,i) => i !== activePhase ? p : {
      ...p, tasks: p.tasks.map(t => t.id === id ? {...t, done:!t.done} : t)
    }));
  }

  async function sendAI() {
    if (!aiInput.trim() || aiLoading || !apiKey || apiKey === "SKIP") return;
    const userMsg = aiInput.trim();
    setAiInput("");
    const base = [...currentChat, {role:"user", text:userMsg}];
    setAiChats(prev => ({...prev, [phase.id]: [...base, {role:"loading", text:"Thinking…"}]}));
    setAiLoading(true);
    setTimeout(() => { if (aiRef.current) aiRef.current.scrollTop = 9999; }, 50);
    try {
      const history = base.slice(-8).flatMap(m =>
        m.role === "user" ? [{role:"user",content:m.text}] : [{role:"assistant",content:m.text}]
      );
      const res = await fetch("https://api.anthropic.com/v1/messages", {
        method:"POST",
        headers:{"Content-Type":"application/json","x-api-key":apiKey,"anthropic-version":"2023-06-01"},
        body: JSON.stringify({
          model:"claude-sonnet-4-20250514",
          max_tokens:1000,
          system: phase.aiPrompt + ` Context: Product "${productName}", phase "${phase.label}", completion ${phasePct}%. Deliverables: ${phase.deliverables.join(", ")}. Be concise.`,
          messages: history,
        })
      });
      const data = await res.json();
      const reply = data.content?.find(c=>c.type==="text")?.text || "Sorry, no response.";
      setAiChats(prev => ({...prev, [phase.id]: [...base, {role:"assistant", text:reply}]}));
    } catch(err) {
      setAiChats(prev => ({...prev, [phase.id]: [...base, {role:"assistant", text:"⚠️ " + err.message}]}));
    } finally {
      setAiLoading(false);
      setTimeout(() => { if (aiRef.current) aiRef.current.scrollTop = 9999; }, 100);
    }
  }

  if (!apiKey) return <ApiKeyModal onSave={saveApiKey}/>;

  return (
    <div className="plc-app">
      {showInstall && <InstallBanner onInstall={handleInstall} onDismiss={() => setShowInstall(false)}/>}

      {/* HEADER */}
      <header className="plc-header">
        <div className="plc-logo">
          <img src={SVG_ICON} className="plc-logo-icon" alt="Trajectory logo"/>
          <div>
            <div className="plc-logo-text">Trajectory<span>.</span></div>
            <div className="plc-logo-tagline">Product Lifecycle</div>
          </div>
        </div>
        <div className="plc-header-right">
          <div className="plc-product-name">
            <span>Product:</span>
            <input value={productName} onChange={e=>setProductName(e.target.value)} placeholder="Product name…"/>
          </div>
          <button className="plc-api-btn" onClick={() => { localStorage.removeItem("trajectory_apikey"); setApiKey(null); }}>
            🔑 API Key
          </button>
        </div>
      </header>

      {/* PHASE TIMELINE */}
      <div className="plc-timeline">
        <div className="plc-timeline-track">
          {phases.map((p,i) => {
            const pct = p.tasks.length ? Math.round(p.tasks.filter(t=>t.done).length/p.tasks.length*100) : 0;
            const isActive = i === activePhase;
            return (
              <React.Fragment key={p.id}>
                <div className="plc-phase-tab"
                  style={{borderBottomColor:isActive?p.color:"transparent"}}
                  onClick={() => setActivePhase(i)}>
                  <div className="plc-phase-icon">{p.icon}</div>
                  <div className="plc-phase-label" style={{color:isActive?p.color:"#8b96aa"}}>{p.label}</div>
                  <div className="plc-phase-sub">{p.sub}</div>
                  <div style={{position:"absolute",bottom:0,left:0,height:3,width:`${pct}%`,background:p.color,opacity:0.35,transition:"width 0.4s"}}/>
                </div>
                {i < phases.length-1 && <div className="plc-connector"/>}
              </React.Fragment>
            );
          })}
        </div>
      </div>

      {/* STAKEHOLDER FILTER */}
      <div className="plc-stakeholders">
        {STAKEHOLDERS.map(s => (
          <button key={s.id} className="plc-sh-btn"
            style={activeSH===s.id?{borderColor:s.color,color:s.color,background:"rgba(255,255,255,0.04)"}:{}}
            onClick={() => setActiveSH(s.id)}>
            <span>{s.icon}</span>{s.label}
          </button>
        ))}
      </div>

      {/* MAIN */}
      <div className="plc-main">
        <div className="plc-content">
          <div className="plc-phase-header">
            <div>
              <div className="plc-phase-title">
                {phase.icon} <span style={{color:phaseColor}}>{phase.label}</span> — {phase.sub}
              </div>
              <div className="plc-phase-desc">
                {visibleTasks.length} task{visibleTasks.length!==1?"s":""}
                {activeSH!=="all"?` · ${STAKEHOLDERS.find(s=>s.id===activeSH)?.label}`:""} · {visibleTasks.filter(t=>t.done).length} completed
              </div>
            </div>
            <ProgressRing pct={phasePct} color={phaseColor} size={64}/>
          </div>

          <div className="plc-section-title">Tasks & Checklist</div>
          <div className="plc-tasks">
            {visibleTasks.length === 0 && (
              <div style={{color:"#5a6270",fontSize:13,padding:"10px 0"}}>No tasks for this stakeholder in this phase.</div>
            )}
            {visibleTasks.map(task => {
              const o = OWNER_MAP[task.owner] || {label:task.owner,color:"#94a3b8"};
              return (
                <div key={task.id} className="plc-task" style={{opacity:task.done?0.45:1}} onClick={() => toggleTask(task.id)}>
                  <div className="plc-task-check" style={task.done?{background:phaseColor,borderColor:phaseColor,color:"#0a0c10"}:{}}>
                    {task.done?"✓":""}
                  </div>
                  <div className="plc-task-title" style={task.done?{textDecoration:"line-through",color:"#8b96aa"}:{}}>{task.title}</div>
                  <div className="plc-task-meta">
                    <span className="plc-task-owner" style={{color:o.color}}>{o.label}</span>
                    <span className={`plc-task-priority plc-priority-${task.priority}`}>{task.priority}</span>
                  </div>
                </div>
              );
            })}
          </div>

          <div className="plc-section-title">Key Deliverables</div>
          <div className="plc-deliverables">
            {phase.deliverables.map(d => (
              <div key={d} className="plc-deliverable">
                <div style={{width:6,height:6,borderRadius:"50%",background:phaseColor,flexShrink:0}}/>
                {d}
              </div>
            ))}
          </div>

          <div className="plc-section-title">Phase Notes</div>
          <textarea className="plc-note-area"
            placeholder={`Add notes for the ${phase.label} phase…`}
            value={notes[phase.id]||""}
            onChange={e => setNotes(prev=>({...prev,[phase.id]:e.target.value}))}/>
        </div>

        {/* SIDEBAR */}
        <div className="plc-sidebar">
          <div className="plc-sidebar-section">
            <div className="plc-section-title">Phase Progress</div>
            {phases.map(p => {
              const pct = p.tasks.length ? Math.round(p.tasks.filter(t=>t.done).length/p.tasks.length*100) : 0;
              return (
                <div key={p.id} className="plc-progress-bar-wrap">
                  <div className="plc-progress-bar-label">
                    <span style={{color:p.id===phase.id?p.color:undefined}}>{p.label}</span>
                    <span>{pct}%</span>
                  </div>
                  <div className="plc-progress-bar-track">
                    <div className="plc-progress-bar-fill" style={{width:`${pct}%`,background:p.color}}/>
                  </div>
                </div>
              );
            })}
          </div>

          <div className="plc-sidebar-section">
            <div className="plc-section-title">Key Metrics to Track</div>
            <div className="plc-metrics">
              {phase.metrics.map(m => (
                <div key={m} className="plc-metric">
                  <div className="plc-metric-dot" style={{background:phaseColor}}/>
                  <div className="plc-metric-label">{m}</div>
                </div>
              ))}
            </div>
          </div>

          <div className="plc-sidebar-section">
            <div className="plc-section-title">Stakeholders in Phase</div>
            <div style={{display:"flex",flexWrap:"wrap",gap:6}}>
              {(phase.stakeholders.includes("all")?STAKEHOLDERS.filter(s=>s.id!=="all"):STAKEHOLDERS.filter(s=>phase.stakeholders.includes(s.id))).map(s => (
                <div key={s.id} style={{padding:"4px 10px",borderRadius:20,fontSize:11,background:"rgba(255,255,255,0.04)",border:`1px solid ${s.color}40`,color:s.color,display:"flex",alignItems:"center",gap:5}}>
                  <span>{s.icon}</span>{s.label}
                </div>
              ))}
            </div>
          </div>

          <div className="plc-sidebar-section">
            <div className="plc-section-title">AI Phase Assistant</div>
            <div className="plc-ai-panel">
              <div className="plc-ai-header">
                <div className="plc-ai-pulse"/>
                Trajectory AI · {phase.label}
              </div>
              <div className="plc-ai-messages" ref={aiRef}>
                {currentChat.length === 0 && (
                  <div style={{color:"#5a6270",fontSize:12,fontStyle:"italic"}}>
                    Ask about {phase.label} — tasks, deliverables, strategy, templates…
                  </div>
                )}
                {currentChat.map((msg,i) => (
                  <div key={i} className="plc-ai-msg" style={{color:msg.role==="user"?"#8b96aa":msg.role==="loading"?"#5a6270":"#e8ecf4"}}>
                    <span style={{color:msg.role==="user"?"#f0c040":msg.role==="loading"?"#5a6270":"#60a5fa",fontWeight:600}}>
                      {msg.role==="user"?"You: ":msg.role==="loading"?"⏳ ":"⚡ AI: "}
                    </span>{msg.text}
                  </div>
                ))}
              </div>
              <div className="plc-ai-input-row">
                <textarea className="plc-ai-input" rows={2}
                  placeholder={apiKey!=="SKIP"?`Ask about ${phase.label}…`:"Add API key to enable AI…"}
                  disabled={apiKey==="SKIP"}
                  value={aiInput}
                  onChange={e=>setAiInput(e.target.value)}
                  onKeyDown={e=>{if(e.key==="Enter"&&!e.shiftKey){e.preventDefault();sendAI();}}}/>
                <button className="plc-ai-send" onClick={sendAI}
                  disabled={aiLoading||!aiInput.trim()||apiKey==="SKIP"}>↑</button>
              </div>
            </div>
          </div>
        </div>
      </div>

      {/* FOOTER */}
      <div className="plc-overall">
        <div className="plc-overall-title">Overall</div>
        {phases.map((p,i) => {
          const pct = p.tasks.length?Math.round(p.tasks.filter(t=>t.done).length/p.tasks.length*100):0;
          const isDone=pct===100; const isActive=i===activePhase;
          return (
            <div key={p.id} className="plc-phase-dot" onClick={()=>setActivePhase(i)}>
              <div className="plc-phase-dot-circle" style={{borderColor:p.color,background:isDone||isActive?p.color:"transparent",boxShadow:isActive?`0 0 8px ${p.color}`:undefined}}/>
              <div className="plc-phase-dot-label" style={{color:isActive?p.color:undefined}}>{p.label}</div>
            </div>
          );
        })}
        <div className="plc-overall-bar">
          <div style={{height:"100%",width:`${totalPct}%`,background:"linear-gradient(90deg,#f0c040,#fb923c)",borderRadius:2,transition:"width 0.4s"}}/>
        </div>
        <div className="plc-overall-pct">{totalPct}% Done</div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
