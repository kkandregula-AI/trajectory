<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0a0c10;--bg2:#0f1218;--bg3:#161b24;--bg4:#1c2230;--bg5:#222a38;
  --border:rgba(255,255,255,0.07);--border2:rgba(255,255,255,0.13);
  --gold:#f0c040;--text:#e8ecf4;--text2:#8b96aa;--text3:#5a6270;
  --red:#f87171;--green:#34d399;--r:12px;--r2:8px;
}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;font-size:14px;}
#root{height:100%;}
::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-thumb{background:var(--bg5);border-radius:2px}

/* ── MODALS ── */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.82);display:flex;align-items:center;justify-content:center;z-index:9999;backdrop-filter:blur(6px)}
.modal-box{background:var(--bg3);border:1px solid var(--border2);border-radius:16px;padding:28px;width:460px;max-width:94vw;box-shadow:0 24px 64px rgba(0,0,0,0.55)}
.modal-title{font-family:'Syne',sans-serif;font-weight:800;font-size:18px;margin-bottom:16px;display:flex;align-items:center;gap:8px}
.modal-label{font-size:11px;font-weight:600;letter-spacing:1px;text-transform:uppercase;color:var(--text3);margin-bottom:6px;display:block}
.modal-input{width:100%;background:var(--bg4);border:1px solid var(--border2);border-radius:8px;color:var(--text);font-family:'DM Sans',sans-serif;font-size:13px;padding:9px 12px;outline:none;margin-bottom:12px}
.modal-input:focus{border-color:var(--gold)}
.modal-select{width:100%;background:var(--bg4);border:1px solid var(--border2);border-radius:8px;color:var(--text);font-family:'DM Sans',sans-serif;font-size:13px;padding:9px 12px;outline:none;margin-bottom:12px;cursor:pointer}
.modal-row{display:flex;gap:10px}
.modal-row .modal-input,.modal-row .modal-select{flex:1}
.btn-gold{background:linear-gradient(135deg,#f0c040,#fb923c);border:none;border-radius:8px;color:#0a0c10;font-family:'Syne',sans-serif;font-weight:700;font-size:13px;padding:10px 20px;cursor:pointer;transition:opacity 0.15s;white-space:nowrap}
.btn-gold:hover{opacity:0.88}
.btn-ghost{background:transparent;border:1px solid var(--border2);border-radius:8px;color:var(--text2);font-family:'DM Sans',sans-serif;font-size:13px;padding:10px 18px;cursor:pointer;transition:all 0.15s}
.btn-ghost:hover{background:var(--bg4)}
.modal-actions{display:flex;gap:10px;justify-content:flex-end;margin-top:6px}

/* ── EXPORT MODAL ── */
.export-options{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:20px}
.export-card{padding:20px 16px;border-radius:var(--r2);border:1px solid var(--border2);background:var(--bg4);cursor:pointer;transition:all 0.15s;text-align:center}
.export-card:hover{border-color:var(--gold);background:var(--bg5)}
.export-card.selected{border-color:var(--gold);background:rgba(240,192,64,0.07)}
.export-card-icon{font-size:28px;margin-bottom:8px}

function uid() { return Math.random().toString(36).slice(2,9); }
function phasePct(p) {
  return p.tasks.length ? Math.round(p.tasks.filter(t=>t.done).length/p.tasks.length*100) : 0;
}

// ── PROGRESS RING ────────────────────────────────────────────────────────────
function Ring({pct,color,size=62}) {
  const r=(size-10)/2, c=2*Math.PI*r, off=c-(pct/100)*c;
  return (
    <svg width={size} height={size}>
      <circle cx={size/2} cy={size/2} r={r} fill="none" stroke="rgba(255,255,255,0.07)" strokeWidth="5"/>
      <circle cx={size/2} cy={size/2} r={r} fill="none" stroke={color} strokeWidth="5"
        strokeDasharray={c} strokeDashoffset={off} strokeLinecap="round"
        style={{transform:"rotate(-90deg)",transformOrigin:"center",transition:"stroke-dashoffset 0.5s"}}/>
      <text x={size/2} y={size/2-3} textAnchor="middle" dominantBaseline="middle"
        fontSize="12" fontFamily="Syne,sans-serif" fontWeight="800" fill="#e8ecf4">{pct}%</text>
      <text x={size/2} y={size/2+10} textAnchor="middle" dominantBaseline="middle"
        fontSize="8" fontFamily="DM Sans,sans-serif" fill="#5a6270">done</text>
    </svg>
  );
}

function exportToExcel(phases, productName, scope, activeIdx) {
  const wb = XLSX.utils.book_new();
  const exportPhases = scope === "current" ? [phases[activeIdx]] : phases;

  // Summary sheet
  const summaryData = [
    ["Trajectory — Product Lifecycle Export"],
    ["Product", productName],
    ["Export Date", new Date().toLocaleDateString()],
    ["Scope", scope === "current" ? `Current Phase: ${phases[activeIdx].label}` : "All Phases"],
    [],
    ["Phase", "Total Tasks", "Completed", "Pending", "Progress %", "Deliverables"],
  ];
  phases.forEach(p => {
    const done = p.tasks.filter(t=>t.done).length;
    summaryData.push([p.label, p.tasks.length, done, p.tasks.length-done, phasePct(p)+"%", p.deliverables.join(", ")]);
  });
  const ws0 = XLSX.utils.aoa_to_sheet(summaryData);
  ws0["!cols"] = [{wch:22},{wch:12},{wch:12},{wch:12},{wch:12},{wch:50}];
  XLSX.utils.book_append_sheet(wb, ws0, "Summary");

  // Per-phase task sheets
  exportPhases.forEach(p => {
    const rows = [
      [`Phase: ${p.label} — ${p.sub}`],
      ["Progress", phasePct(p)+"%"],
      [],
      ["#","Task","Owner","Priority","Status"],
    ];
    p.tasks.forEach((t,i) => {
      rows.push([i+1, t.title, OWNER_MAP[t.owner]?.label||t.owner, t.priority.toUpperCase(), t.done?"✓ Done":"Pending"]);
    });
    rows.push([]);
    rows.push(["Deliverables"]);
    p.deliverables.forEach(d => rows.push(["", d]));
    const ws = XLSX.utils.aoa_to_sheet(rows);
    ws["!cols"] = [{wch:4},{wch:48},{wch:16},{wch:10},{wch:10}];
    const safeName = p.label.replace(/[^a-zA-Z0-9]/g,"").slice(0,28);
    XLSX.utils.book_append_sheet(wb, ws, safeName);
  });

  XLSX.writeFile(wb, `Trajectory_${productName.replace(/\s+/g,"_")}_${new Date().toISOString().slice(0,10)}.xlsx`);
}

function exportToPDF(phases, productName, scope, activeIdx) {
  const { jsPDF } = window.jspdf;
  const doc = new jsPDF({orientation:"portrait",unit:"mm",format:"a4"});
  const exportPhases = scope === "current" ? [phases[activeIdx]] : phases;
  const W = 210, margin = 15;

  // Header
  doc.setFillColor(10,12,16);
  doc.rect(0,0,W,28,`F`);
  doc.setFillColor(240,192,64);
  doc.roundedRect(margin,7,14,14,3,3,"F");
  doc.setTextColor(10,12,16);
  doc.setFont("helvetica","bold");
  doc.setFontSize(8);
  doc.text("T",margin+3.5,16.5);
  doc.setTextColor(240,192,64);
  doc.setFontSize(15);
  doc.setFont("helvetica","bold");
  doc.text("Trajectory",margin+18,17);
  doc.setTextColor(140,150,170);
  doc.setFontSize(8);
  doc.setFont("helvetica","normal");
  doc.text("Product Lifecycle Report",margin+18,22);
  doc.setTextColor(200,210,220);
  doc.setFontSize(8);
  const dateStr = new Date().toLocaleDateString("en-GB",{day:"2-digit",month:"short",year:"numeric"});
  doc.text(`Product: ${productName}   |   ${dateStr}   |   ${scope==="current"?"Phase: "+phases[activeIdx].label:"Full Lifecycle"}`,margin,35);

  // Progress summary bar
  let y = 42;
  doc.setFillColor(22,27,36);
  doc.roundedRect(margin,y,W-margin*2,22,3,3,"F");
  const totalDone = phases.reduce((a,p)=>a+p.tasks.filter(t=>t.done).length,0);
  const totalTasks = phases.reduce((a,p)=>a+p.tasks.length,0);
  const totalPct = totalTasks ? Math.round(totalDone/totalTasks*100) : 0;
  doc.setTextColor(240,192,64);
  doc.setFont("helvetica","bold");
  doc.setFontSize(9);
  doc.text("OVERALL PROGRESS",margin+4,y+7);
  doc.setTextColor(200,210,220);
  doc.setFontSize(9);
  doc.text(`${totalDone}/${totalTasks} tasks completed   ${totalPct}%`,margin+4,y+14);
  // mini progress bar
  doc.setFillColor(28,34,48);
  doc.roundedRect(margin+85, y+10, W-margin*2-90, 4, 2,2,"F");
  if(totalPct>0){
    const r1=[240,192,64], r2=[251,146,60];
    const mix=(a,b,t)=>Math.round(a+(b-a)*t);
    doc.setFillColor(mix(r1[0],r2[0],totalPct/100),mix(r1[1],r2[1],totalPct/100),mix(r1[2],r2[2],totalPct/100));
    doc.roundedRect(margin+85, y+10, (W-margin*2-90)*totalPct/100, 4, 2,2,"F");
  }
  y += 28;

  // Phase pages
  exportPhases.forEach((p,pi) => {
    if(pi > 0){ doc.addPage(); y=15; }
    const pct = phasePct(p);
    const done = p.tasks.filter(t=>t.done).length;

    // Phase title bar
    const hex = p.color;
    const hx = parseInt(hex.slice(1),16);
    const pr=[(hx>>16)&255,(hx>>8)&255,hx&255];
    doc.setFillColor(22,27,36);
    doc.roundedRect(margin,y,W-margin*2,16,3,3,"F");
    doc.setDrawColor(pr[0],pr[1],pr[2]);
    doc.setLineWidth(0.6);
    doc.roundedRect(margin,y,W-margin*2,16,3,3,"S");
    doc.setTextColor(pr[0],pr[1],pr[2]);
    doc.setFont("helvetica","bold");
    doc.setFontSize(12);
    doc.text(`${p.label}  —  ${p.sub}`,margin+4,y+9);
    doc.setTextColor(140,150,170);
    doc.setFontSize(8);
    doc.text(`${done}/${p.tasks.length} tasks · ${pct}% complete`,W-margin-2,y+9,{align:"right"});
    // small progress pill
    doc.setFillColor(28,34,48);
    doc.roundedRect(margin,y+12,W-margin*2,3,1,1,"F");
    if(pct>0){
      doc.setFillColor(pr[0],pr[1],pr[2]);
      doc.roundedRect(margin,y+12,(W-margin*2)*pct/100,3,1,1,"F");
    }
    y += 20;

    // Tasks table
    doc.autoTable({
      startY: y,
      head: [["#","Task","Owner","Priority","Status"]],
      body: p.tasks.map((t,i) => [
        i+1, t.title, OWNER_MAP[t.owner]?.label||t.owner,
        t.priority.toUpperCase(), t.done?"✓ Done":"Pending"
      ]),
      theme:"plain",
      styles:{font:"helvetica",fontSize:8,cellPadding:2.5,textColor:[200,210,220],lineColor:[30,40,54],lineWidth:0.1},
      headStyles:{fillColor:[22,27,36],textColor:[140,150,170],fontStyle:"bold",fontSize:7.5},
      columnStyles:{0:{cellWidth:8},2:{cellWidth:24},3:{cellWidth:18},4:{cellWidth:18}},
      alternateRowStyles:{fillColor:[15,18,24]},
      didParseCell(data){
        if(data.column.index===4 && data.cell.text[0]==="✓ Done"){
          data.cell.styles.textColor=[52,211,153];
        }
        if(data.column.index===3){
          const v=data.cell.text[0];
          if(v==="HIGH") data.cell.styles.textColor=[248,113,113];
          else if(v==="MEDIUM") data.cell.styles.textColor=[251,146,60];
        }
      },
      margin:{left:margin,right:margin},
    });
    y = doc.lastAutoTable.finalY + 6;

    // Deliverables
    doc.setTextColor(90,98,112);
    doc.setFont("helvetica","bold");
    doc.setFontSize(7);
    doc.text("DELIVERABLES",margin,y+4);
    y += 7;
    const chips = p.deliverables;
    let cx = margin;
    chips.forEach(d => {
      const tw = doc.getTextWidth(d)+6;
      if(cx+tw > W-margin){ cx=margin; y+=7; }
      doc.setFillColor(22,27,36);
      doc.roundedRect(cx,y-3,tw,6,1.5,1.5,"F");
      doc.setTextColor(pr[0],pr[1],pr[2]);
      doc.setFontSize(7.5);
      doc.setFont("helvetica","normal");
      doc.text(d,cx+3,y+1);
      cx += tw+4;
    });
    y += 10;
  });

  doc.save(`Trajectory_${productName.replace(/\s+/g,"_")}_${new Date().toISOString().slice(0,10)}.pdf`);
}

    const h=e=>{e.preventDefault();setDeferred(e);setShowInstall(true);};
    window.addEventListener("beforeinstallprompt",h);
    return ()=>window.removeEventListener("beforeinstallprompt",h);
  },[]);

  function saveApiKey(key){
    if(key!=="SKIP") localStorage.setItem("trajectory_apikey",key);
    setApiKey(key);
  }

  const phase = phases[activePhase];
  const pc = phase.color;
  const visibleTasks = activeSH==="all" ? phase.tasks : phase.tasks.filter(t=>t.owner===activeSH);
  const currPct = phasePct(phase);
  const allTasks = phases.flatMap(p=>p.tasks);
  const totalPct = allTasks.length ? Math.round(allTasks.filter(t=>t.done).length/allTasks.length*100) : 0;
  const chat = aiChats[phase.id]||[];

  // ── Phase mutators
  function updatePhase(idx, fn) {
    setPhases(prev=>prev.map((p,i)=>i===idx?fn(p):p));
  }
  function toggleTask(tid) {
    updatePhase(activePhase, p=>({...p,tasks:p.tasks.map(t=>t.id===tid?{...t,done:!t.done}:t)}));
  }
  function addTask(task) {
    updatePhase(activePhase, p=>({...p,tasks:[...p.tasks,task]}));
  }
  function deleteTask(tid) {
    updatePhase(activePhase, p=>({...p,tasks:p.tasks.filter(t=>t.id!==tid)}));
  }
  function addDeliverable(d) {
    updatePhase(activePhase, p=>({...p,deliverables:[...p.deliverables,d]}));
  }
  function deleteDeliverable(d) {
    updatePhase(activePhase, p=>({...p,deliverables:p.deliverables.filter(x=>x!==d)}));
  }

  // ── AI
  async function sendAI() {
    if(!aiInput.trim()||aiLoading||!apiKey||apiKey==="SKIP") return;
    const msg=aiInput.trim(); setAiInput("");
    const base=[...chat,{role:"user",text:msg}];
    setAiChats(prev=>({...prev,[phase.id]:[...base,{role:"loading",text:"Thinking…"}]}));
    setAiLoading(true);
    setTimeout(()=>{if(aiRef.current)aiRef.current.scrollTop=9999;},50);
    try{
      const history=base.slice(-8).flatMap(m=>
        m.role==="user"?[{role:"user",content:m.text}]:[{role:"assistant",content:m.text}]
      );
      const res=await fetch("https://api.anthropic.com/v1/messages",{
        method:"POST",
        headers:{"Content-Type":"application/json","x-api-key":apiKey,"anthropic-version":"2023-06-01"},
        body:JSON.stringify({
          model:"claude-sonnet-4-20250514",max_tokens:1000,
          system:phase.aiPrompt+` Context: product "${productName}", phase "${phase.label}", ${currPct}% done. Deliverables: ${phase.deliverables.join(", ")}.`,
          messages:history,
        })
      });
      const data=await res.json();
      const reply=data.content?.find(c=>c.type==="text")?.text||"No response.";
      setAiChats(prev=>({...prev,[phase.id]:[...base,{role:"assistant",text:reply}]}));
    }catch(err){
      setAiChats(prev=>({...prev,[phase.id]:[...base,{role:"assistant",text:"⚠️ "+err.message}]}));
    }finally{
      setAiLoading(false);
      setTimeout(()=>{if(aiRef.current)aiRef.current.scrollTop=9999;},100);
    }
  }

  if(!apiKey) return <ApiKeyModal onSave={saveApiKey}/>;

  return (
    <div className="plc-app">
      {showInstall&&(
        <div className="install-banner">
          <img src={SVG_ICON} alt="Trajectory"/>
          <div className="install-banner-text">
            <div className="install-banner-title">Install Trajectory</div>
            <div className="install-banner-sub">Add to home screen for full app experience</div>
          </div>
          <button className="btn-gold" style={{padding:"8px 16px",fontSize:12}}
            onClick={async()=>{deferredPrompt?.prompt();setShowInstall(false);}}>Install</button>
          <button className="install-banner-close" onClick={()=>setShowInstall(false)}>✕</button>
        </div>
      )}

      {showExport&&<ExportModal phases={phases} productName={productName} activeIdx={activePhase} onClose={()=>setShowExport(false)}/>}

      {/* HEADER */}
      <header className="plc-header">
        <div className="plc-logo">
          <img src={SVG_ICON} alt="Trajectory"/>
          <div>
            <div className="plc-logo-text">Trajectory<span>.</span></div>
            <div className="plc-logo-tag">Product Lifecycle</div>
          </div>
        </div>
        <div className="plc-header-right">
          <input className="plc-product-input" value={productName}
            onChange={e=>setProductName(e.target.value)} placeholder="Product name…"/>
          {savedToast&&<span style={{fontSize:11,color:"#34d399",display:"flex",alignItems:"center",gap:4,animation:"fadeIn 0.3s ease"}}><span>✓</span> Saved</span>}
            <span>📤</span> Export
          </button>
          <button className="hdr-btn" title="Reset all progress & data" onClick={()=>{
            if(window.confirm("Reset all progress, tasks and notes? This cannot be undone.")){
              ["trajectory_phases","trajectory_productName","trajectory_notes","trajectory_activePhase"].forEach(k=>localStorage.removeItem(k));
              setPhases(INIT_PHASES.map(p=>({...p,tasks:p.tasks.map(t=>({...t})),deliverables:[...p.deliverables]})));
              setProductName("My Product"); setNotes({}); setActivePhase(0);
            }
          }}>↺ Reset</button>
          <button className="hdr-btn" onClick={()=>{localStorage.removeItem("trajectory_apikey");setApiKey(null);}}>
            🔑 API Key
          </button>
        </div>
      </header>

      {/* TIMELINE */}
      <div className="plc-timeline">
        <div className="plc-timeline-track">
          {phases.map((p,i)=>{
            const pct=phasePct(p); const active=i===activePhase;
            return (
              <React.Fragment key={p.id}>
                <div className="plc-phase-tab"
                  style={{borderBottomColor:active?p.color:"transparent"}}
                  onClick={()=>setActivePhase(i)}>
                  <div className="plc-phase-icon">{p.icon}</div>
                  <div className="plc-phase-label" style={{color:active?p.color:"#8b96aa"}}>{p.label}</div>
                  <div className="plc-phase-sub">{p.sub}</div>
                  <div style={{position:"absolute",bottom:0,left:0,height:3,width:`${pct}%`,background:p.color,opacity:0.35,transition:"width 0.4s"}}/>
                </div>
                {i<phases.length-1&&<div className="plc-connector"/>}
              </React.Fragment>
            );
          })}
        </div>
      </div>

      {/* STAKEHOLDERS */}
      <div className="plc-stakeholders">
        {STAKEHOLDERS.map(s=>(
          <button key={s.id} className="sh-btn"
            style={activeSH===s.id?{borderColor:s.color,color:s.color,background:"rgba(255,255,255,0.04)"}:{}}
            onClick={()=>setActiveSH(s.id)}>
            <span>{s.icon}</span>{s.label}
          </button>
        ))}
      </div>

      {/* MAIN */}
      <div className="plc-main">

        {/* CONTENT */}
        <div className="plc-content">
          <div className="plc-phase-header">
            <div>
              <div className="plc-phase-title">
                {phase.icon} <span style={{color:pc}}>{phase.label}</span> — {phase.sub}
              </div>
              <div className="plc-phase-desc">
                {visibleTasks.length} task{visibleTasks.length!==1?"s":""}
                {activeSH!=="all"?` · ${STAKEHOLDERS.find(s=>s.id===activeSH)?.label}`:""} · {visibleTasks.filter(t=>t.done).length} completed
              </div>
            </div>
            <Ring pct={currPct} color={pc} size={62}/>
          </div>

          {/* TASKS */}
          <div className="section-title">Tasks & Checklist</div>
          <div className="tasks-list">
            {visibleTasks.length===0&&(
              <div style={{color:"var(--text3)",fontSize:12,padding:"8px 0"}}>No tasks for this stakeholder.</div>
            )}
            {visibleTasks.map(task=>{
              const o=OWNER_MAP[task.owner]||{label:task.owner,color:"#94a3b8"};
              return (
                <div key={task.id} className="task-item" style={task.done?{background:"rgba(52,211,153,0.08)",borderColor:"rgba(52,211,153,0.3)"}:{}}
                  onClick={e=>{if(!e.target.closest(".task-del-btn"))toggleTask(task.id);}}>
                  <div className="task-check"
                    style={task.done?{background:pc,borderColor:pc,color:"#0a0c10"}:{}}>
                    {task.done?"✓":""}
                  </div>
                  <div className="task-title"
                    style={task.done?{color:"#34d399",fontWeight:500}:{}}>{task.title}</div>
                  <div className="task-meta">
                    <span className="task-owner" style={{color:o.color}}>{o.label}</span>
                    <span className={`task-pri pri-${task.priority}`}>{task.priority}</span>
                  </div>
                  <button className="task-del-btn" title="Delete task"
                    onClick={e=>{e.stopPropagation();deleteTask(task.id);}}>✕</button>
                </div>
              );
            })}
          </div>
          {activeSH==="all"&&<AddTaskRow phaseColor={pc} onAdd={addTask}/>}

          {/* DELIVERABLES */}
          <div className="section-title" style={{marginTop:8}}>Key Deliverables</div>
          <div className="deliverables-list">
            {phase.deliverables.map(d=>(
              <div key={d} className="deliverable-chip">
                <div className="chip-dot" style={{background:pc}}/>
                {d}
                <button className="chip-del" title="Delete" onClick={()=>deleteDeliverable(d)}>✕</button>
              </div>
            ))}
          </div>
          <AddDeliverableRow phaseColor={pc} onAdd={addDeliverable}/>

          {/* NOTES */}
          <div className="section-title">Phase Notes</div>
          <textarea className="note-area"
            placeholder={`Add notes for the ${phase.label} phase…`}
            value={notes[phase.id]||""}
            onChange={e=>setNotes(prev=>({...prev,[phase.id]:e.target.value}))}/>
        </div>

        {/* SIDEBAR */}
        <div className="plc-sidebar">
          <div className="sidebar-section">
            <div className="section-title">Phase Progress</div>
            {phases.map(p=>{
              const pct=phasePct(p);
              return (
                <div key={p.id} className="progress-bar-wrap">
                  <div className="progress-bar-label">
                    <span style={{color:p.id===phase.id?p.color:undefined,cursor:"pointer"}}
                      onClick={()=>setActivePhase(phases.indexOf(p))}>{p.label}</span>
                    <span>{pct}%</span>
                  </div>
                  <div className="progress-bar-track">
                    <div className="progress-bar-fill" style={{width:`${pct}%`,background:p.color}}/>
                  </div>
                </div>
              );
            })}
          </div>

          <div className="sidebar-section">
            <div className="section-title">Key Metrics</div>
            <div className="metrics-list">
              {phase.metrics.map(m=>(
                <div key={m} className="metric-item">
                  <div className="metric-dot" style={{background:pc}}/>
                  <div className="metric-label">{m}</div>
                </div>
              ))}
            </div>
          </div>

          <div className="sidebar-section">
            <div className="section-title">Stakeholders in Phase</div>
            <div style={{display:"flex",flexWrap:"wrap",gap:5}}>
              {(phase.stakeholders.includes("all")?STAKEHOLDERS.filter(s=>s.id!=="all"):STAKEHOLDERS.filter(s=>phase.stakeholders.includes(s.id))).map(s=>(
                <div key={s.id} style={{padding:"3px 9px",borderRadius:20,fontSize:11,background:"rgba(255,255,255,0.04)",border:`1px solid ${s.color}40`,color:s.color,display:"flex",alignItems:"center",gap:4}}>
                  <span>{s.icon}</span>{s.label}
                </div>
              ))}
            </div>
          </div>

          {/* EXPORT SHORTCUT */}
          <div className="sidebar-section">
            <div className="section-title">Export</div>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}}>
              <button className="btn-ghost" style={{fontSize:12,padding:"9px 8px",textAlign:"center",display:"flex",flexDirection:"column",alignItems:"center",gap:4}}
                onClick={()=>{exportToPDF(phases,productName,"all",activePhase);}}>
                <span style={{fontSize:18}}>📄</span>
                <span>PDF</span>
                <span style={{fontSize:9,color:"var(--text3)"}}>Full report</span>
              </button>
              <button className="btn-ghost" style={{fontSize:12,padding:"9px 8px",textAlign:"center",display:"flex",flexDirection:"column",alignItems:"center",gap:4}}
                onClick={()=>{exportToExcel(phases,productName,"all",activePhase);}}>
                <span style={{fontSize:18}}>📊</span>
                <span>Excel</span>
                <span style={{fontSize:9,color:"var(--text3)"}}>All phases</span>
              </button>
            </div>
          </div>

          {/* AI */}
          <div className="sidebar-section">
            <div className="section-title">AI Phase Assistant</div>
            <div className="ai-panel">
              <div className="ai-header">
                <div className="ai-pulse"/><span>Trajectory AI · {phase.label}</span>
              </div>
              <div className="ai-messages" ref={aiRef}>
                {chat.length===0&&(
                  <div style={{color:"var(--text3)",fontSize:11.5,fontStyle:"italic"}}>
                    Ask about {phase.label} — tasks, deliverables, strategy…
                  </div>
                )}
                {chat.map((m,i)=>(
                  <div key={i} className="ai-msg" style={{color:m.role==="user"?"#8b96aa":m.role==="loading"?"#5a6270":"#e8ecf4"}}>
                    <span style={{color:m.role==="user"?"#f0c040":m.role==="loading"?"#5a6270":"#60a5fa",fontWeight:600}}>
                      {m.role==="user"?"You: ":m.role==="loading"?"⏳ ":"⚡ AI: "}
                    </span>{m.text}
                  </div>
                ))}
              </div>
              <div className="ai-input-row">
                <textarea className="ai-input" rows={2}
                  placeholder={apiKey!=="SKIP"?`Ask about ${phase.label}…`:"Add API key to enable…"}
                  disabled={apiKey==="SKIP"}
                  value={aiInput} onChange={e=>setAiInput(e.target.value)}
                  onKeyDown={e=>{if(e.key==="Enter"&&!e.shiftKey){e.preventDefault();sendAI();}}}/>
                <button className="ai-send" onClick={sendAI}
                  disabled={aiLoading||!aiInput.trim()||apiKey==="SKIP"}>↑</button>
              </div>
            </div>
          </div>
        </div>
      </div>

      {/* FOOTER */}
      <div className="plc-footer">
        <div className="footer-title">Overall</div>
        {phases.map((p,i)=>{
          const pct=phasePct(p); const isDone=pct===100; const isActive=i===activePhase;
          return (
            <div key={p.id} className="phase-dot" onClick={()=>setActivePhase(i)}>
              <div className="phase-dot-circle" style={{borderColor:p.color,background:isDone||isActive?p.color:"transparent",boxShadow:isActive?`0 0 7px ${p.color}`:undefined}}/>
              <div className="phase-dot-label" style={{color:isActive?p.color:undefined}}>{p.label}</div>
            </div>
          );
        })}
        <div className="overall-bar">
          <div style={{height:"100%",width:`${totalPct}%`,background:"linear-gradient(90deg,#f0c040,#fb923c)",borderRadius:2,transition:"width 0.4s"}}/>
        </div>
        <div className="overall-pct">{totalPct}% Done</div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
